name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Source image (e.g., nginx, ubuntu, redis)'
        required: true
        type: string
      image_name:
        description: 'Output image name (e.g., yourusername/myapp)'
        required: true
        type: string
      image_tag:
        description: 'Image tag (leave empty for latest)'
        required: false
        default: 'latest'
        type: string
      architectures:
        description: 'Target architectures (comma separated: amd64,arm64,arm)'
        required: true
        default: 'amd64,arm64'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Parse inputs
        id: parse
        run: |
          IMAGE_SOURCE="${{ github.event.inputs.image_source }}"
          IMAGE_NAME="${{ github.event.inputs.image_name }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          ARCHITECTURES="${{ github.event.inputs.architectures }}"

          # Default tag to latest if empty
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="latest"
          fi

          # Convert architectures to platform format
          PLATFORMS=""
          IFS=',' read -ra ARCH_ARRAY <<< "$ARCHITECTURES"
          for arch in "${ARCH_ARRAY[@]}"; do
            case $arch in
              amd64) PLATFORMS="${PLATFORMS:+$PLATFORMS,}linux/amd64" ;;
              arm64) PLATFORMS="${PLATFORMS:+$PLATFORMS,}linux/arm64" ;;
              arm) PLATFORMS="${PLATFORMS:+$PLATFORMS,}linux/arm/v7" ;;
            esac
          done

          # Generate version tag
          VERSION=$(date +%Y%m%d-%H%M%S)

          echo "image_source=$IMAGE_SOURCE" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "architectures=$ARCHITECTURES" >> $GITHUB_OUTPUT

          echo "=== Build Configuration ==="
          echo "Source: $IMAGE_SOURCE"
          echo "Output: $IMAGE_NAME:$IMAGE_TAG"
          echo "Platforms: $PLATFORMS"
          echo "Version: $VERSION"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: ${{ steps.parse.outputs.platforms }}
          push: true
          tags: |
            ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}
            ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.version }}
          build-args: |
            SOURCE_IMAGE=${{ steps.parse.outputs.image_source }}

      - name: Export images as tar files
        run: |
          IMAGE_NAME="${{ steps.parse.outputs.image_name }}"
          IMAGE_TAG="${{ steps.parse.outputs.image_tag }}"
          ARCHITECTURES="${{ steps.parse.outputs.architectures }}"
          VERSION="${{ steps.parse.outputs.version }}"

          mkdir -p images

          IFS=',' read -ra ARCH_ARRAY <<< "$ARCHITECTURES"
          for arch in "${ARCH_ARRAY[@]}"; do
            PLATFORM=""
            case $arch in
              amd64) PLATFORM="linux/amd64" ;;
              arm64) PLATFORM="linux/arm64" ;;
              arm) PLATFORM="linux/arm/v7" ;;
            esac

            echo "Exporting image for $arch ($PLATFORM)..."
            
            # Export image to tar
            docker buildx build \
              --platform "$PLATFORM" \
              --load \
              -t "${IMAGE_NAME}:${IMAGE_TAG}-${arch}" \
              --build-arg SOURCE_IMAGE="${{ steps.parse.outputs.image_source }}" \
              .

            # Save to tar file
            docker save "${IMAGE_NAME}:${IMAGE_TAG}-${arch}" -o "images/${IMAGE_NAME##*/}-${IMAGE_TAG}-${arch}.tar"
            
            echo "Exported: images/${IMAGE_NAME##*/}-${IMAGE_TAG}-${arch}.tar"
          done

          # Create multi-arch manifest tar
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" -o "images/${IMAGE_NAME##*/}-${IMAGE_TAG}-manifest.tar" 2>/dev/null || true

          # List all exported files
          echo "=== Exported Files ==="
          ls -lh images/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.parse.outputs.version }}
          name: "${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}"
          body: |
            ## Docker Image Build Complete

            **Source Image:** `${{ steps.parse.outputs.image_source }}`

            **Output Image:** `${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}`

            **Version:** `${{ steps.parse.outputs.version }}`

            **Architectures:** `${{ steps.parse.outputs.architectures }}`

            ---

            ### Online Pull Commands

            ```bash
            # Pull latest tag
            docker pull ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}

            # Pull specific version
            docker pull ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.version }}

            # Pull specific architecture
            docker pull --platform linux/amd64 ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}
            docker pull --platform linux/arm64 ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}
            docker pull --platform linux/arm/v7 ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}
            ```

            ---

            ### Offline Image Files (tar)

            Download the tar file for offline import:

            ```bash
            # Import from tar file
            docker load -i ${{ steps.parse.outputs.image_name }}-${{ steps.parse.outputs.image_tag }}-amd64.tar
            docker load -i ${{ steps.parse.outputs.image_name }}-${{ steps.parse.outputs.image_tag }}-arm64.tar
            docker load -i ${{ steps.parse.outputs.image_name }}-${{ steps.parse.outputs.image_tag }}-arm.tar
            docker load -i ${{ steps.parse.outputs.image_name }}-${{ steps.parse.outputs.image_tag }}-manifest.tar

            # Then tag and push
            docker tag ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}-amd64 ${{ steps.parse.outputs.image_name }}:${{ steps.parse.outputs.image_tag }}
            ```

            ---

            ### Build Info

            - Build Time: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            - Workflow: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            images/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate summary
        run: |
          IMAGE_NAME="${{ steps.parse.outputs.image_name }}"
          IMAGE_TAG="${{ steps.parse.outputs.image_tag }}"
          PLATFORMS="${{ steps.parse.outputs.platforms }}"
          VERSION="${{ steps.parse.outputs.version }}"

          echo "## Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Image:** \`${{ github.event.inputs.image_source }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Output Image:** \`${IMAGE_NAME}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`${PLATFORMS}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Offline Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker load -i ${IMAGE_NAME##*/}-${IMAGE_TAG}-amd64.tar" >> $GITHUB_STEP_SUMMARY
          echo "docker load -i ${IMAGE_NAME##*/}-${IMAGE_TAG}-arm64.tar" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release" >> $GITHUB_STEP_SUMMARY
          echo "View release: [${VERSION}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION})" >> $GITHUB_STEP_SUMMARY
